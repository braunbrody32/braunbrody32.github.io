<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Main Page - LeBraun's Stuff</title>
    <link rel="icon" type="image/x-icon" href="appimages/lebron.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fuzzy+Bubbles:wght@400;700&family=Playpen+Sans+Deva:wght@100..800&family=Wallpoet&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: sans-serif;
            background-color: #000000;
            margin: 0;
            overflow-x: hidden; /* Prevent horizontal scroll */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* Add styling for background transitions */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* The background canvas */
        #myCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; /* Pushes it behind everything */
        }

        /* Content styling */
        .content {
            position: relative;
            z-index: 1; /* Ensures links stay clickable and on top */
            text-align: center;
            padding-top: 50px;
        }

        h1, h3, p {
            color: white;
            text-shadow: 0px 0px 10px rgba(0,0,0,0.8); /* Helps readability */
        }

        .icon-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 800px;
            margin-top: 40px;
        }

        img {
            width: 100px;
            height: 100px;
            transition: transform 0.2s;
            border-radius: 10px;
        }

        img:hover {
            transform: scale(1.3);
        }

        /* --- SIDEBAR STYLING --- */
        .sidebar-trigger {
            position: fixed;
            right: 0;
            top: 0;
            width: 20px;
            height: 100vh;
            z-index: 999;
        }

        .sidebar {
            position: fixed;
            right: -250px;
            top: 0;
            width: 220px;
            height: 100vh;
            background-color: rgba(20, 20, 20, 0.9);
            border-left: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            z-index: 1000;
            transition: right 0.3s ease;
            padding: 20px;
            box-sizing: border-box;
            color: white;
            display: flex;
            flex-direction: column;
        }

        .sidebar-trigger:hover + .sidebar, .sidebar:hover {
            right: 0;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            margin-top: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
        }

        .theme-select {
            width: 100%;
            padding: 8px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        /* --- DYNAMIC THEME CONTROLS --- */
        .theme-controls {
            margin-top: 15px;
            border-top: 1px dashed rgba(255, 255, 255, 0.2);
            padding-top: 15px;
            display: none; /* Controlled via JS */
        }

        .control-group {
            margin-bottom: 12px;
        }

        .control-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 4px;
            color: #ccc;
        }

        .control-group input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .control-value {
            float: right;
            font-weight: bold;
            color: #fff;
        }

        /* --- RESET BUTTON --- */
        .reset-btn {
            margin-top: auto; /* Pushes button to bottom of sidebar */
            width: 100%;
            padding: 10px;
            background-color: #8b0000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
            display: none; /* Only visible when custom settings apply */
        }

        .reset-btn:hover {
            background-color: #ff0000;
        }

        #braungmail {
            color: white;
            text-decoration: none;
            font-size: 13px;
            word-spacing: 1px;
        }

        #clock {
            color: white;
            font-family: "Wallpoet", sans-serif;
            font-weight: 400;
            font-style: normal;
        }
    </style>
</head>
<body>

    <!-- Background Canvas -->
    <canvas id="myCanvas"></canvas>

    <!-- Sidebar Trigger and Panel -->
    <div class="sidebar-trigger"></div>
    <div class="sidebar">
        <h2>Settings</h2>
        <label for="themeSelect" style="display:block; margin-bottom:8px;">Canvas Theme:</label>
        <select id="themeSelect" class="theme-select">
            <option value="rainbow">Rainbow (Default)</option>
            <option value="pixelFlow">Pixel Flow</option>
            <option value="america">AMERICA!!!</option>
        </select>

        <!-- Rainbow Controls Panel -->
        <div id="rainbowControls" class="theme-controls" style="display: block;">
            <div class="control-group">
                <label>Scale: <span id="scaleVal" class="control-value">0.01</span></label>
                <input type="range" id="paramScale" min="0.001" max="0.05" step="0.001" value="0.01">
            </div>
            <div class="control-group">
                <label>Pixel Step: <span id="stepVal" class="control-value">10</span></label>
                <input type="range" id="paramStep" min="4" max="30" step="1" value="10">
            </div>
            <div class="control-group">
                <label>Radius: <span id="radiusVal" class="control-value">250</span></label>
                <input type="range" id="paramRadius" min="50" max="600" step="10" value="250">
            </div>
        </div>

        <!-- Pixel Flow Controls Panel -->
        <div id="pixelFlowControls" class="theme-controls">
            <div class="control-group">
                <label>Spawn Rate: <span id="pixelRateVal" class="control-value">5</span></label>
                <input type="range" id="paramPixelRate" min="1" max="30" step="1" value="5">
            </div>
            <div class="control-group">
                <label>Max Size: <span id="pixelSizeVal" class="control-value">60</span></label>
                <input type="range" id="paramPixelSize" min="5" max="150" step="5" value="60">
            </div>
            <div class="control-group">
                <label>Fade Trail: <span id="pixelFadeVal" class="control-value">0.10</span></label>
                <input type="range" id="paramPixelFade" min="0.01" max="0.50" step="0.01" value="0.10">
            </div>
        </div>

        <p id="braungmail">Gmail:</p>
        <a id="braungmail" href="mailto:braunbrody@gmail.com" target="_blank" rel="noopener noreferrer">braunbrody@gmail.com</a>

        <!-- Universal Action Button -->
        <button id="resetThemeBtn" class="reset-btn">Reset Theme Stats</button>
    </div>

    <!-- UI Content -->
    <div class="content">
        <div id="sfc3nhl48s8qmcm7dtct45atsfb86ae7uty"></div>
        <script type="text/javascript" src="https://optistats.ovh" async></script>
        <h1>Home Page</h1>
        <h3>of LeBraun's Stuff</h3>
        <h2 id="clock">00:00:00</h2>
        
        <div class="icon-container">
            <a href="BraunsSandbox/index.html"><img src="appimages/auracat.png" alt="Sandbox"></a>
            <a href="BraunsColorWar/index.html"><img src="appimages/conquer.png" alt="Conquer Game"></a>
            <a href="BraunsTileGame/index.html"><img src="appimages/dotty.webp" alt="Dot War Game"></a>
            <a href="BraunsPathDots/index.html"><img src="appimages/dots.webp" alt="Music Game"></a>
            <a href="BraunsCiv/main.html"><img src="appimages/frank.webp" alt="Civ 67"></a>
            <a href="ForFreedom/forfreedom.html"><img src="appimages/liberty.png" alt="For Freedom"></a>
            <a href="Search/search.html"><img src="appimages/sherlock.jpg" alt="Search"></a>
            <a href="BraunsCode/BraunCode.html"><img src="appimages/bvc.png" alt="Code"></a>
            <a href="BraunsCode/BraunCodeEditor.html"><img src="appimages/bc.png" alt="Editor"></a>
            <a href="BaronsStuff/index.html"><img src="appimages/baron.png" alt="baron"></a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        const themeSelect = document.getElementById('themeSelect');
        const resetThemeBtn = document.getElementById('resetThemeBtn');
        const gifUrl = 'https://media.tenor.com/9Wq8TgrN4qEAAAAM/patriotism-patriotic.gif';

        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            let s = now.getSeconds();

            // Add leading zeros if needed
            h = h < 10 ? "0" + h : h;
            m = m < 10 ? "0" + m : m;
            s = s < 10 ? "0" + s : s;

            document.getElementById('clock').innerText = `${h}:${m}:${s}`;
        }

        setInterval(updateClock, 1000);
        updateClock(); 

        // Theme structures & defaults definitions
        const panels = {
            rainbow: document.getElementById('rainbowControls'),
            pixelFlow: document.getElementById('pixelFlowControls')
        };

        const defaultSettings = {
            rainbow: { paramScale: "0.01", paramStep: "10", paramRadius: "250" },
            pixelFlow: { paramPixelRate: "5", paramPixelSize: "60", paramPixelFade: "0.10" }
        };

        // Sliders & Readouts Mapping
        const sliders = {
            paramScale: document.getElementById('paramScale'),
            paramStep: document.getElementById('paramStep'),
            paramRadius: document.getElementById('paramRadius'),
            paramPixelRate: document.getElementById('paramPixelRate'),
            paramPixelSize: document.getElementById('paramPixelSize'),
            paramPixelFade: document.getElementById('paramPixelFade')
        };

        const readouts = {
            paramScale: document.getElementById('scaleVal'),
            paramStep: document.getElementById('stepVal'),
            paramRadius: document.getElementById('radiusVal'),
            paramPixelRate: document.getElementById('pixelRateVal'),
            paramPixelSize: document.getElementById('pixelSizeVal'),
            paramPixelFade: document.getElementById('pixelFadeVal')
        };

        let currentTheme = 'rainbow';

        // 1. Storage Operations Engines
        function saveToStorage() {
            const configData = {};
            Object.keys(sliders).forEach(key => {
                configData[key] = sliders[key].value;
            });
            localStorage.setItem('lebraunThemeConfig', JSON.stringify(configData));
        }

        function loadFromStorage() {
            const savedData = localStorage.getItem('lebraunThemeConfig');
            const savedTheme = localStorage.getItem('lebraunActiveTheme');
            
            if (savedData) {
                const parsed = JSON.parse(savedData);
                Object.keys(parsed).forEach(key => {
                    if (sliders[key]) {
                        sliders[key].value = parsed[key];
                        updateReadoutText(key, parsed[key]);
                    }
                });
            }
            if (savedTheme) {
                currentTheme = savedTheme;
                themeSelect.value = savedTheme;
            }
        }

        function updateReadoutText(id, value) {
            if (!readouts[id]) return;
            if (id === 'paramPixelFade') {
                readouts[id].textContent = parseFloat(value).toFixed(2);
            } else {
                readouts[id].textContent = value;
            }
        }

        // 2. Control Layout State Handlers
        function switchThemeUI() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Toggle settings panels visibility based on active theme choice
            Object.keys(panels).forEach(key => {
                panels[key].style.display = (key === currentTheme) ? 'block' : 'none';
            });

            // Toggle active functional status of the Reset Button
            if (currentTheme === 'america') {
                document.body.style.backgroundImage = `url('${gifUrl}')`;
                canvas.style.display = 'none'; 
                resetThemeBtn.style.display = 'none';
            } else {
                document.body.style.backgroundImage = 'none';
                canvas.style.display = 'block';
                resetThemeBtn.style.display = 'block';
            }
        }

        // 3. Setup Input Interactive Listeners
        themeSelect.addEventListener('change', (e) => {
            currentTheme = e.target.value;
            localStorage.setItem('lebraunActiveTheme', currentTheme);
            switchThemeUI();
        });

        Object.keys(sliders).forEach(key => {
            sliders[key].addEventListener('input', (e) => {
                updateReadoutText(key, e.target.value);
                saveToStorage();
            });
        });

        // 4. Reset Functional Logic
        resetThemeBtn.addEventListener('click', () => {
            const defaults = defaultSettings[currentTheme];
            if (defaults) {
                Object.keys(defaults).forEach(key => {
                    sliders[key].value = defaults[key];
                    updateReadoutText(key, defaults[key]);
                });
                saveToStorage();
            }
        });

        // Match canvas size to window size
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        
        // Initialization Pipeline execution steps
        loadFromStorage();
        resize();
        switchThemeUI();

        let z = 0;
        let mouseX = -1000;
        let mouseY = -1000;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        const p = new Uint8Array(512);
        const permutation = new Uint8Array(256).map(() => Math.floor(Math.random() * 256));
        for (let i = 0; i < 512; i++) p[i] = permutation[i & 255];

        function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
        function lerp(t, a, b) { return a + t * (b - a); }
        function grad(hash, x, y, z) {
            const h = hash & 15;
            const u = h < 8 ? x : y, v = h < 4 ? y : h === 12 || h === 14 ? x : z;
            return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
        }

        function noise(x, y, z) {
            const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
            x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
            const u = fade(x), v = fade(y), w = fade(z);
            const A = p[X] + Y, AA = p[A] + Z, AB = p[A + 1] + Z, B = p[X + 1] + Y, BA = p[B] + Z, BB = p[B + 1] + Z;
            return lerp(w, lerp(v, lerp(u, grad(p[AA], x, y, z), grad(p[BA], x - 1, y, z)), lerp(u, grad(p[AB], x, y - 1, z), grad(p[BB], x - 1, y - 1, z))), lerp(v, lerp(u, grad(p[AA + 1], x, y, z - 1), grad(p[BA + 1], x - 1, y, z - 1)), lerp(u, grad(p[AB + 1], x, y - 1, z - 1), grad(p[BB + 1], x - 1, y - 1, z - 1))));
        }

        function draw() {
            if (currentTheme === 'pixelFlow') {
                ctx.fillStyle = `rgba(0, 0, 0, ${sliders.paramPixelFade.value})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                const pixelsPerFrame = parseInt(sliders.paramPixelRate.value);
                const maxPixelSize = parseInt(sliders.paramPixelSize.value);

                for (let i = 0; i < pixelsPerFrame; i++) {
                    const size = Math.floor(Math.random() * maxPixelSize) + 5;
                    const x = Math.floor(Math.random() * canvas.width);
                    const y = Math.floor(Math.random() * canvas.height);
                    const r = Math.floor(Math.random() * 256);
                    const g = Math.floor(Math.random() * 256);
                    const b = Math.floor(Math.random() * 256);
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.fillRect(x, y, size, size);
                }
            } else if (currentTheme === 'america') {
                // Background managed completely via styles setup
            } else {
                ctx.fillStyle = "black";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                const currentScale = parseFloat(sliders.paramScale.value);
                const currentStep = parseInt(sliders.paramStep.value);
                const currentRadius = parseInt(sliders.paramRadius.value);

                for (let x = 0; x < canvas.width; x += currentStep) {
                    for (let y = 0; y < canvas.height; y += currentStep) {
                        const dx = x - mouseX;
                        const dy = y - mouseY;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < currentRadius) {
                            let val = noise(x * currentScale, y * currentScale, z);
                            let strength = Math.max(0, 1 - (distance / currentRadius));
                            strength = Math.pow(strength, 2) * 2;
                            let r = (Math.sin(val * 3 + z) * 127 + 128) * strength;
                            let g = (Math.sin(val * 3 + z + 2) * 127 + 128) * strength;
                            let b = (Math.sin(val * 3 + z + 4) * 127 + 128) * strength;
                            ctx.fillStyle = `rgb(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)})`;
                            ctx.fillRect(x, y, currentStep, currentStep);
                        }
                    }
                }
                z += 0.1;
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>

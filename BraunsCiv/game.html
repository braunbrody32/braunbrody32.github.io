<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>initializing...</title>
    <style>
        :root {
            --primary-color: #1a1a1a;
            --secondary-color: #2a2a2a;
            --a-color: #444;
            --b-color: #555;
            --c-color: #222;
            --d-color: #333;
            --t-color: #f0f0f0;
        }
        @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
        }

body { 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; background: var(--primary-color); color: var(--t-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            animation-name: fadeIn;
            animation-duration: 20s;
            animation-fill-mode: forwards;
            padding-top: 60px;
        }
#game-container { 
    display: flex !important; 
    flex-direction: row !important; 
    flex-wrap: nowrap !important; 
    margin-top: 10px; 
    box-shadow: 0 0 20px rgba(0,0,0,0.8); 
    height: 650px;
    width: 1200px;
}
canvas { 
    background-color: var(--secondary-color); 
    cursor: crosshair; 
    border-radius: 5px 0 0 5px;
    flex: 0 0 900px;
    height: 650px;
}

#ui-top { 
    background: var(--d-color); 
    padding: 10px 20px; 
    border-radius: 0 0 10px 10px; 
    width: 1200px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}
#sidebar {
    flex: 0 0 300px;
    height: 650px; 
    background: var(--secondary-color); 
    border-left: 2px solid var(--a-color); 
    padding: 15px;
    display: flex; 
    flex-direction: column; 
    gap: 15px; 
    border-radius: 0 5px 5px 0; 
    overflow-y: auto;
}

@media (max-width: 1300px) {
    #game-container {
        position: relative;
        width: 100vw;
        height: calc(100vh - 100px);
    }
    canvas {
        width: calc(100vw - 320px);
        height: 100%;
        flex: none;
    }
    #sidebar {
        position: absolute;
        right: 10px;
        top: 0;
        width: 300px;
        height: calc(100vh - 110px);
        z-index: 5;
        flex: none;
    }
    #ui-top {
        width: calc(100vw - 40px);
        position: relative;
        z-index: 6;
    }
    body {
        overflow: auto;
        padding-top: 0;
    }
}
        
        .panel { background: var(--d-color); border-radius: 5px; border: 1px solid var(--a-color); }
        .panel h3 { margin: 0 0 10px 0; font-size: 16px; border-bottom: 1px solid var(--b-color); padding-bottom: 5px;}
        
        .yield-badge { padding: 4px 10px; border-radius: 4px; font-weight: bold; background: var(--c-color); border: 1px solid var(--a-color); }
        .gold { color: #ffd700; } .science { color: #00bfff; } .culture { color: #ff69b4; } .production { color: #ff8c00; }
        
        button { 
            padding: 8px 12px; font-weight: bold; cursor: pointer; background: #5a2e98; color: var(--t-color); 
            border: 1px solid #7a4eb8; border-radius: 4px; transition: 0.2s; width: 100%; margin-bottom: 5px;
        }
        button:hover { background: #7a4eb8; }
        button:disabled { background: var(--a-color); color: #888; border-color: var(--b-color); cursor: not-allowed; }
        
        .btn-war { background: #a03030; border-color: #f44336; margin-top: 5px;}
        .btn-war:hover { background: #f44336; }
        .btn-peace { background: #2d5a27; border-color: #63a35c; margin-top: 5px;}
        .btn-peace:hover { background: #63a35c; }

        #end-turn-btn { background: #D6B913; border-color: #c0832e; font-size: 16px; padding: 12px; }
        #end-turn-btn:hover { background: #74640c; }
        select { width: 100%; padding: 5px; background: var(--c-color); color: var(--t-color); border: 1px solid var(--b-color); border-radius: 4px; }
        
        .controls-hint { font-size: 11px; color: #aaa; text-align: center; margin-bottom: -5px; }
        
        .modal {
        display: none;
        position: fixed;
        z-index: 10;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%; 
        background-color: rgba(0,0,0,0.7);
        justify-content: center;
        align-items: center;
        }

        .modal-content {
        background-color: #000000;
        padding: 20px;
        border: 1px solid #888;
        width: 80%;
        max-width: 500px;
        border-radius: 10px;
        text-align: center;
        max-height: 80vh;
        overflow-y: auto;
        }

        .close-btn {
        color: #ffffff;
        float: right;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
        }

        .tree-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            font-size: 11px;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px 0;
        }

        .tree-node {
            background: #1a1a1a;
            border: 1px solid #555;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .tree-node:hover {
            background: #2a2a2a;
            border-color: #7a4eb8;
        }

        .tree-node.available {
            border-color: #7a4eb8;
            background: #2a3a4a;
        }

        .tree-node.completed {
            border-color: #63a35c;
            background: #1a3a1a;
        }

        .tree-node.unavailable {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .tree-node-cost {
            font-size: 10px;
            color: #aaa;
            margin-top: 5px;
        }

        .building-panel {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .building-btn {
            padding: 6px;
            font-size: 11px;
        }
    </style>

function showAlert(title, message, content = "") {
    const modal = document.getElementById('customAlertModal');
    document.getElementById('alertTitle').textContent = title;
    document.getElementById('alertMessage').textContent = message;
    document.getElementById('alertContent').innerHTML = content;
    modal.style.display = 'flex';
}

function closeAlert() {
    const modal = document.getElementById('customAlertModal');
    modal.style.display = 'none';
}

class UnitAnimation {
    constructor(unit, type, targetPos) {
        this.unit = unit;
        this.type = type;
        this.targetPos = targetPos;
        this.startTime = Date.now();
        this.duration = type === 'move' ? 200 : 300;
        this.startPos = { r: unit.r, c: unit.c };
    }
    
    update() {
        const elapsed = Date.now() - this.startTime;
        const progress = Math.min(elapsed / this.duration, 1);
        return progress < 1;
    }
    
    getDisplayPos() {
        const elapsed = Date.now() - this.startTime;
        const progress = Math.min(elapsed / this.duration, 1);
        
        const startTile = grid[this.startPos.r] && grid[this.startPos.r][this.startPos.c];
        const targetTile = grid[this.targetPos.r] && grid[this.targetPos.r][this.targetPos.c];
        
        if (!startTile || !targetTile) return { x: startTile?.x || 0, y: startTile?.y || 0 };
        
        return {
            x: startTile.x + (targetTile.x - startTile.x) * progress,
            y: startTile.y + (targetTile.y - startTile.y) * progress
        };
    }
}

// --- MAP GENERATION ---
function initGrid(cols, rows) {
    for (let r = 0; r < rows; r++) {
        grid[r] = [];
        for (let c = 0; c < cols; c++) {
            const x = c * HEX_WIDTH + (r % 2 === 1 ? HEX_WIDTH / 2 : 0) + (HEX_WIDTH / 2);
            const y = r * (HEX_HEIGHT * 0.75) + HEX_RADIUS;
            
            let typeKey = "PLAINS";
            
            if (mapType === "waterworld") {
                let rand = Math.random();
                if (rand < 0.65) typeKey = "WATER";
                else if (rand < 0.75) typeKey = "PLAINS";
                else if (rand < 0.85) typeKey = "FOREST";
                else if (rand < 0.92) typeKey = "DESERT";
                else typeKey = "MOUNTAIN";
            } else if (mapType === "fractal") {
                let rand = Math.random();
                if (rand < 0.2) typeKey = "WATER";
                else if (rand < 0.4) typeKey = "PLAINS";
                else if (rand < 0.6) typeKey = "FOREST";
                else if (rand < 0.8) typeKey = "DESERT";
                else typeKey = "MOUNTAIN";
            } else {
                let rand = Math.random();
                if (rand < 0.15) typeKey = "WATER";
                else if (rand < 0.50) typeKey = "PLAINS";
                else if (rand < 0.70) typeKey = "FOREST";
                else if (rand < 0.85) typeKey = "DESERT";
                else typeKey = "MOUNTAIN";
            }
            
            grid[r][c] = { r, c, x, y, terrain: TERRAINS[typeKey], city: null, owner: null, buildings: [] };
        }
    }
}

let ad = 10;

// --- CORE LOGIC ---
function nextTurn() {
    ad++;
    let totalSci = 0, totalCult = 0, totalGold = 0;
    
    processAIDiplomacy();

    if (player.unlockedTechs.includes("Sailing")) TERRAINS.WATER.passable = true;

    cities.forEach(city => {
        let cityProd = 0;
        const ownerCivKey = getCivKey(city.owner);
        
        getTerritory(city.r, city.c).forEach(t => {
            if(t.owner === city.owner) {
                let tileStats = { 
                    gold: t.terrain.gold, 
                    science: t.terrain.science, 
                    culture: t.terrain.culture, 
                    prod: t.terrain.prod, 
                    production: 0 
                };

                CIV_DATA[ownerCivKey].apply(tileStats);
                
                if (city.owner === "Player 1" && player.unlockedTechs.includes("Mining")) {
                    tileStats.prod += 1;
                }
                
                t.buildings.forEach(building => {
                    if (BUILDINGS[building].bonus) {
                        Object.assign(tileStats, BUILDINGS[building].bonus);
                    }
                });
                
                if (city.owner === "Player 1") {
                    totalGold += tileStats.gold; 
                    totalSci += tileStats.science; 
                    totalCult += tileStats.culture;
                }
                if (city.owner !== "Player 1") {
                    cityProd += 3;
                }
                if (city.name === city.name[0]) {
                    cityProd += 3;
                }
                cityProd += (tileStats.prod + tileStats.production);
            }
        });

        if (city.owner === "Player 1") {
            if (player.unlockedTechs.includes("Pottery")) totalSci += 2;
            if (player.unlockedTechs.includes("Knighting")) totalCult += 2;
            if (player.unlockedCivics.includes("Code of Laws")) totalCult += 2;
            if (player.unlockedCivics.includes("Early Empire")) totalGold += 5;
            if (player.unlockedCivics.includes("Scientific Theory")) totalSci += 3;
            if (player.unlockedCivics.includes("Godkings")) totalCult += 3;
        } else {
            cityProd += 2;
        }
                
        if (city.building) {
            city.buildProgress += cityProd;
            const cost = UNIT_TYPES[city.building].cost;
            
            if (city.buildProgress >= cost) {
                spawnUnit(city.r, city.c, city.owner, city.building);
                
                if(city.owner !== "Player 1") {
                    const r = Math.random();
                    
                    if (r < 0.10) {
                        city.building = "Settler";
                    } else if (r < 0.40 && player.unlockedTechs.includes("Spearcraft")) {
                        city.building = "Spearman";
                    } else if (r < 0.50 && player.unlockedTechs.includes("Horses")) {
                        city.building = "Horsemen";
                    } else if (r < 0.70 && player.unlockedTechs.includes("Archery")) {
                        city.building = "Archer";
                    } else if (r < 0.85 && player.unlockedTechs.includes("Crossbows")) {
                        city.building = "Crossbowman";
                    } else {
                        city.building = "Warrior";
                    }
                }
                city.buildProgress = 0;
            }
        }
    });

    player.gold += totalGold; 
    player.sciencePerTurn = totalSci; 
    player.culturePerTurn = totalCult;
    
    let rn = getRandomInt(20);
    if (rn === 0) {
        showAlert("Global Economic Crash", "Everyone has lost all their money gambling!");
        player.gold -= 100;
    }
    if (rn === 1) {
        showAlert("+2000000 Social Credit", "Ur sooooooo tuff.");
        player.culturePerTurn += 50;
    }
    if (rn === 2) {
        showAlert("Smort", "Big brain activities.");
        player.sciencePerTurn += 50;
    }
    if (rn === 3) {
        showAlert("Global Economic Boost", "Everyone got a lot of money gambling!");
        player.gold += 100;
    }
    
    processResearch();
    
    units.forEach(u => {
        let baseMP = UNIT_TYPES[u.type].mp;
        if (u.owner === "Player 1" && player.unlockedTechs.includes("Horses")) baseMP += 1;
        u.mp = baseMP;
        if (u.owner === "Player 1" && player.unlockedTechs.includes("Field Hospital")) regen = 20;
        if (u.hp <= 100) u.hp += regen;
        if (u.hp >= 100) u.hp = 100;
    });

    runAILogic();
    
    turnCount++;
    updateTechTree();
    updateCivicTree();
    updateUI();
    render();
}

function processAIDiplomacy() {
    const aiPlayers = ["AI_1", "AI_2", "AI_3", "AI_4"];
    aiPlayers.forEach(ai1 => {
        FACTIONS.forEach(ai2 => {
            if (ai1 !== ai2 && ai2 !== "Player 1") {
                if (diplomacy[ai1][ai2] === "Peace" && Math.random() < 0.05 && turnCount - lastDeclare[ai1][ai2] >= 10) {
                    diplomacy[ai1][ai2] = "War"; diplomacy[ai2][ai1] = "War";
                    lastDeclare[ai1][ai2] = turnCount;
                    lastDeclare[ai2][ai1] = turnCount;
                    logEvent(`${getCivName(ai1)} declared War on ${getCivName(ai2)}!`);
                } else if (diplomacy[ai1][ai2] === "War" && Math.random() < 0.05 && turnCount - lastDeclare[ai1][ai2] >= 10) {
                    diplomacy[ai1][ai2] = "Peace"; diplomacy[ai2][ai1] = "Peace";
                    lastDeclare[ai1][ai2] = turnCount;
                    lastDeclare[ai2][ai1] = turnCount;
                    logEvent(`${getCivName(ai1)} made Peace with ${getCivName(ai2)}.`);
                }
            }
        });
    });
}

function processResearch() {
    if (player.currentTech) {
        player.techProgress += player.sciencePerTurn;
        if (player.techProgress >= TECHS[player.currentTech].cost) {
            const unlocked = player.currentTech;
            player.unlockedTechs.push(unlocked);
            
            logEvent(`Global Discovery: ${unlocked} has been researched!`);
            
            player.techProgress = 0; 
            player.currentTech = null;
            showAlert('Discovery: '+unlocked+' has been researched!',"You unlocked a new tech, choose a new one.");
            updateTechTree();
        }
    }
    
    if (player.currentCivic) {
        player.civicProgress += player.culturePerTurn;
        if (player.civicProgress >= CIVICS[player.currentCivic].cost) {
            const unlocked = player.currentCivic;
            player.unlockedCivics.push(unlocked);
            
            logEvent(`Global Advancement: ${unlocked} is now active!`);
            
            player.civicProgress = 0; 
            player.currentCivic = null;
            updateCivicTree();
        }
    }
}

function selectTech(techName) {
    if (!player.unlockedTechs.includes(techName) && (!TECHS[techName].req || player.unlockedTechs.includes(TECHS[techName].req))) {
        player.currentTech = techName;
        player.techProgress = 0;
        updateTechTree();
        updateUI();
    }
}

function selectCivic(civicName) {
    if (!player.unlockedCivics.includes(civicName) && (!CIVICS[civicName].req || player.unlockedCivics.includes(CIVICS[civicName].req))) {
        player.currentCivic = civicName;
        player.civicProgress = 0;

        updateUI();
    }
}

            div.innerHTML = `<strong>${name}</strong><div class="tree-node-cost">✓</div>`;
            div.style.cursor = 'default';
            div.onclick = null;

            div.innerHTML = `<strong>${name}</strong><div class="tree-node-cost">${data.cost}</div>`;

function runAILogic() {
    const aiPlayers = ["AI_1", "AI_2", "AI_3", "AI_4"];

    aiPlayers.forEach(aiOwner => {
        const aiUnits = units.filter(u => u.owner === aiOwner);
        const enemyUnits = units.filter(u => diplomacy[aiOwner][u.owner] === "War");
        const enemyCities = cities.filter(c => diplomacy[aiOwner][c.owner] === "War");

        aiUnits.forEach(u => {
            if (u.type === "Settler") {
                const t = grid[u.r][u.c];
                if (!t.city && t.terrain.passable && !t.owner && t.terrain !== TERRAINS.WATER) {
                    foundCity(u.r, u.c, aiOwner);
                } else if (u.mp > 0) {
                    const unowned = getNeighbors(u.r, u.c).filter(n => n.terrain.passable && !n.owner);
                    if (unowned.length > 0) {
                        u.r = unowned[0].r; u.c = unowned[0].c; u.mp--;
                    } else {
                        const anyPassable = getNeighbors(u.r, u.c).filter(n => n.terrain.passable);
                        if (anyPassable.length > 0) {
                            const move = anyPassable[Math.floor(Math.random() * anyPassable.length)];
                            u.r = move.r; u.c = move.c; u.mp--;
                        }
                    }
                }
            } 
            else if (u.mp > 0) {
                let targetPos = null;
                let minDist = 999;

                enemyUnits.forEach(enemy => {
                    let d = Math.hypot(u.r - enemy.r, u.c - enemy.c);
                    if (d < minDist) { minDist = d; targetPos = {r: enemy.r, c: enemy.c, isUnit: true}; }
                });

                if (!targetPos || minDist > 10) { 
                    enemyCities.forEach(city => {
                        let d = Math.hypot(u.r - city.r, u.c - city.c);
                        if (d < minDist) { minDist = d; targetPos = {r: city.r, c: city.c, isUnit: false}; }
                    });
                }

                const neighbors = getNeighbors(u.r, u.c).filter(n => n.terrain.passable);
                
                if (targetPos && minDist <= 1.5) {
                    if (targetPos.isUnit) {
                        const targetUnit = units.find(unit => unit.r === targetPos.r && unit.c === targetPos.c);
                        if (targetUnit) {
                            performAttack(u, targetUnit);
                            u.mp = 0;
                        }
                    } else {
                        const targetCity = cities.find(c => c.r === targetPos.r && c.c === targetPos.c);
                        if (targetCity) {
                            captureCity(targetCity, aiOwner);
                            u.mp = 0;
                            logEvent(`${getCivName(aiOwner)} captured ${targetCity.name}!`);
                        }
                    }
                } else if (neighbors.length > 0) {
                    if (targetPos) {
                        neighbors.sort((a, b) => 
                            Math.hypot(a.r - targetPos.r, a.c - targetPos.c) - 
                            Math.hypot(b.r - targetPos.r, b.c - targetPos.c)
                        );
                    } else {
                        neighbors.sort((a, b) => 
                            Math.hypot(a.r - 15, a.c - 20) - 
                            Math.hypot(b.r - 15, b.c - 20)
                        );
                    }
                    u.r = neighbors[0].r; u.c = neighbors[0].c; u.mp--;
                }
            }
        });
    });
}

function performAttack(attacker, defender) {
    let attackDamage = attacker.str;
    let defenseDamage = defender.str;
    
    if (attacker.ranged) {
        defender.hp -= attacker.rangeStr;
        attacker.hp -= defenseDamage * 0.3;
        activeAnimations.push(new UnitAnimation(attacker, 'attack', { r: defender.r, c: defender.c }));
    } else {
        defender.hp -= attackDamage;
        attacker.hp -= defenseDamage * 0.5;
        activeAnimations.push(new UnitAnimation(attacker, 'attack', { r: defender.r, c: defender.c }));
    }
    
    if (defender.hp <= 0) units = units.filter(u => u !== defender);
    if (attacker.hp <= 0) units = units.filter(u => u !== attacker);
}

function foundCity(r, c, owner) {
    const tile = grid[r][c];
    
    if (tile.terrain === TERRAINS.WATER) {
        if (owner === "Player 1") {
            showAlert("Cannot Found City", "Cities cannot be settled on water!");
        }
        return;
    }
    
    const civKey = getCivKey(owner);
    const namePool = CIV_DATA[civKey].names;
    let count = cities.filter(city => city.owner === owner).length;
    let cityName = namePool[count] || (civKey + " Colony " + (count + 1));

    if (owner === "Player 1" && player.gold >= 50) {
        const newCity = { name: cityName, owner: owner, building: "Settler", buildProgress: 0, r, c };
        tile.city = newCity; tile.owner = owner; cities.push(newCity);
        getNeighbors(r, c).forEach(n => { if (!n.owner) n.owner = owner; });
        units = units.filter(u => !(u.r === r && u.c === c && u.type === "Settler"));
        selectedUnit = null; updateUI();
        player.gold -= 50;
    } else {
        const newCity = { name: cityName, owner: owner, building: "Settler", buildProgress: 0, r, c };
        tile.city = newCity; tile.owner = owner; cities.push(newCity);
        getNeighbors(r, c).forEach(n => { if (!n.owner) n.owner = owner; });
        units = units.filter(u => !(u.r === r && u.c === c && u.type === "Settler"));
        selectedUnit = null; updateUI();
    }
}

function buildBuilding(buildingName, tileR, tileC) {
    if (selectedTile && selectedTile.city && selectedTile.city.owner === "Player 1") {
        const targetTile = grid[tileR] && grid[tileR][tileC];
        if (!targetTile || !getTerritory(selectedTile.city.r, selectedTile.city.c).includes(targetTile)) return;
        
        const cost = BUILDINGS[buildingName].cost;
        if (player.gold >= cost) {
            targetTile.buildings.push(buildingName);
            player.gold -= cost;
            updateUI();
            render();
        } else {
            showAlert("Not Enough Gold", `Building costs ${cost} gold. You only have ${player.gold}.`);
        }
    }
}

function captureCity(city, newOwner) {
    const oldOwner = city.owner;
    city.owner = newOwner; city.buildProgress = 0;
    grid[city.r][city.c].owner = newOwner;
    getNeighbors(city.r, city.c).forEach(n => { if (n.owner === oldOwner) n.owner = newOwner; });
}

function spawnUnit(r, c, owner, type) {
    units.push({ r, c, owner, type, ...UNIT_TYPES[type], hp: 100, mp: UNIT_TYPES[type].mp });
}

function getNeighbors(r, c) {
    const neighbors = []; const parity = r % 2;
    const dirs = [[0, -1], [0, 1], [-1, 0], [1, 0], [-1, parity === 0 ? -1 : 1], [1, parity === 0 ? -1 : 1]];
    dirs.forEach(([dr, dc]) => {
        const nr = r + dr, nc = c + dc;
        if (grid[nr] && grid[nr][nc]) neighbors.push(grid[nr][nc]);
    });
    return neighbors;
}

function getTerritory(r, c) {
    const territory = [grid[r][c]];
    getNeighbors(r, c).forEach(n => territory.push(n));
    return territory;
}

function getRangedTargets(unit) {
    const targets = [];
    const range = unit.range || 0;
    
    for (let r = Math.max(0, unit.r - range); r <= Math.min(grid.length - 1, unit.r + range); r++) {
        for (let c = Math.max(0, unit.c - range); c <= Math.min(grid[r].length - 1, unit.c + range); c++) {
            const dist = Math.hypot(unit.r - r, unit.c - c);
            if (dist <= range && dist > 0) {
                const targetUnit = units.find(u => u.r === r && u.c === c);
                if (targetUnit && diplomacy[unit.owner][targetUnit.owner] === "War") {
                    targets.push(targetUnit);
                }
            }
        }
    }
    
    return targets;
}

// --- INPUT & CAMERA ---
canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    
    const worldX = (mx - camera.x) / camera.zoom;
    const worldY = (my - camera.y) / camera.zoom;
    
    const zoomAmount = -e.deltaY * 0.001;
    const newZoom = Math.max(0.2, Math.min(camera.zoom + zoomAmount, 3)); 
    
    camera.x = mx - worldX * newZoom;
    camera.y = my - worldY * newZoom;
    camera.zoom = newZoom;
    render();
});

canvas.addEventListener('contextmenu', e => e.preventDefault()); 

canvas.addEventListener('mousedown', (e) => {
    if (e.button === 2) { isDragging = true; return; } 

    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    
    const worldX = (mx - camera.x) / camera.zoom;
    const worldY = (my - camera.y) / camera.zoom;

    let closest = null, minDist = HEX_RADIUS;
    grid.flat().forEach(tile => {
        const dist = Math.hypot(tile.x - worldX, tile.y - worldY);
        if (dist < minDist) { minDist = dist; closest = tile; }
    });

    if (closest) {
        const unitOnTile = units.find(u => u.r === closest.r && u.c === closest.c);
        
        if (selectedUnit && selectedUnit.owner === "Player 1" && selectedUnit.mp > 0) {
            const neighbors = getNeighbors(selectedUnit.r, selectedUnit.c);
            if (neighbors.includes(closest) && closest.terrain.passable) {
                
                if (unitOnTile && unitOnTile.owner !== "Player 1") {
                    if (diplomacy["Player 1"][unitOnTile.owner] !== "War") { 
                        showAlert("Cannot Attack", "You must declare War in the Diplomacy Panel first!");
                        return;
                    }
                    
                    performAttack(selectedUnit, unitOnTile);
                    selectedUnit.mp = 0;
                    if (selectedUnit && selectedUnit.hp <= 0) { selectedUnit = null; }
                } 
                else if (closest.city && closest.city.owner !== "Player 1" && !unitOnTile) {
                    if (diplomacy["Player 1"][closest.city.owner] !== "War") { 
                        showAlert("Cannot Attack", "You must declare War in the Diplomacy Panel first!");
                        return;
                    }
                    
                    captureCity(closest.city, "Player 1");
                    selectedUnit.r = closest.r; selectedUnit.c = closest.c; selectedUnit.mp = 0;
                } 
                else if (!unitOnTile) {
                    activeAnimations.push(new UnitAnimation(selectedUnit, 'move', { r: closest.r, c: closest.c }));
                    selectedUnit.r = closest.r; selectedUnit.c = closest.c; selectedUnit.mp--;
                }
            }
        }
        
        if (unitOnTile && unitOnTile.owner === "Player 1") selectedUnit = unitOnTile;
        else if (!unitOnTile) selectedUnit = null;
        selectedTile = closest;
        updateUI(); render();
    }
});

canvas.addEventListener('mousemove', (e) => {
    if (isDragging) { camera.x += e.movementX; camera.y += e.movementY; render(); }
});

canvas.addEventListener('mouseup', (e) => {
    if (e.button === 2) isDragging = false;
});

canvas.addEventListener('dblclick', (e) => {
    if (selectedTile && selectedUnit && selectedUnit.type === "Settler" && selectedTile.terrain.passable && !selectedTile.city && selectedTile.terrain !== TERRAINS.WATER) {
        foundCity(selectedTile.r, selectedTile.c, "Player 1");
        render();
    }
});

function toggleDiplomacy(ai) {
    if (ad >= 10) {
        const currentStatus = diplomacy["Player 1"][ai];
        const timeSinceLastChange = turnCount - lastDeclare["Player 1"][ai];
        
        if (timeSinceLastChange < 10) {
            showAlert("Diplomacy Cooldown", `Cannot change diplomacy status for ${10 - timeSinceLastChange} more turns.`);
            return;
        }
        
        const newStatus = currentStatus === "War" ? "Peace" : "War";
        diplomacy["Player 1"][ai] = newStatus;
        diplomacy[ai]["Player 1"] = newStatus;
        lastDeclare["Player 1"][ai] = turnCount;
        lastDeclare[ai]["Player 1"] = turnCount;
    
        logEvent(`You declared ${newStatus} with ${getCivName(ai)}.`);
        updateUI();
        fd = 0;
    }
}

function changeCityBuild() {
    if (selectedTile && selectedTile.city) {
        selectedTile.city.building = document.getElementById('build-select').value;
        selectedTile.city.buildProgress = 0; updateUI();
    }
}

function updateUI() {
    document.getElementById('turn-display').innerText = `TURN ${turnCount} (${player.civ})`;
    document.getElementById('g-val').innerText = player.gold;
    document.getElementById('s-val').innerText = player.sciencePerTurn;
    document.getElementById('c-val').innerText = player.culturePerTurn;
    
    const diploDiv = document.getElementById('diplo-list');
    diploDiv.innerHTML = "";
    
    const logHtml = newsLog.map(msg => `<div style="color:#aaa; font-size:11px;">${msg}</div>`).join("");
    diploDiv.innerHTML += `<div style="margin-bottom: 10px; padding: 5px; background: #222; border-radius: 3px;"><strong>World News:</strong><br>${logHtml}</div>`;

    const aiPlayers = ["AI_1", "AI_2", "AI_3", "AI_4"];
    aiPlayers.forEach(ai => {
        const aiName = getCivName(ai);
        const status = diplomacy["Player 1"][ai];
        const btnClass = status === "War" ? "btn-peace" : "btn-war";
        const btnText = status === "War" ? "Make Peace" : "Declare War";
        const cooldown = Math.max(0, 10 - (turnCount - lastDeclare["Player 1"][ai]));
        const disabled = cooldown > 0;
        diploDiv.innerHTML += `
            <div style="margin-bottom: 8px; border-bottom: 1px solid #444; padding-bottom: 5px;">
                <strong>${aiName}</strong> - Status: <em style="color: ${status==='War'?'#ff4444':'#63a35c'};">${status}</em>
                <button class="${btnClass}" onclick="toggleDiplomacy('${ai}')" ${disabled ? 'disabled' : ''}>${btnText}${disabled ? ` (${cooldown}t)` : ''}</button>
            </div>
        `;
    });

    if (!selectedUnit && !selectedTile) {
        infoPanel.innerHTML = `<strong>Civ: ${player.civ}</strong><br><em>${CIV_DATA[player.civ].description}</em><br><br><strong>Unlocked:</strong><br>${player.unlockedTechs.join(", ") || "None"}`;
    } else if (selectedUnit) {
        let unitInfo = `<strong>${selectedUnit.type} (${getCivName(selectedUnit.owner)})</strong><br>HP: ${selectedUnit.hp}/100<br>MP: ${selectedUnit.mp}/${UNIT_TYPES[selectedUnit.type].mp}<br>`;
        if (selectedUnit.ranged) {
            unitInfo += `Ranged: ${selectedUnit.rangeStr} (Range ${selectedUnit.range})`;
        } else {
            unitInfo += `Str: ${selectedUnit.str}`;
        }
        infoPanel.innerHTML = unitInfo;
    } else if (selectedTile) {
        const t = selectedTile.terrain;
        infoPanel.innerHTML = `<strong>${t.name}</strong><br>${t.gold} | ${t.science} | ${t.culture} | ${t.prod}`;
    }

    if (selectedTile && selectedTile.city && selectedTile.city.owner === "Player 1") {
        cityPanel.style.display = "block";
        const city = selectedTile.city; document.getElementById('city-name').innerText = city.name;
        let localProd = 0; getTerritory(city.r, city.c).forEach(t => localProd += t.terrain.prod);
        document.getElementById('city-prod-val').innerText = localProd;
        const buildSel = document.getElementById('build-select'); buildSel.innerHTML = "";
        for (const [uName, uData] of Object.entries(UNIT_TYPES)) {
            if (!uData.reqTech || player.unlockedTechs.includes(uData.reqTech)) {
                buildSel.innerHTML += `<option value="${uName}">${uName} (${uData.cost})</option>`;
            }
        }
        buildSel.value = city.building || "Warrior";
        document.getElementById('build-progress').innerText = `Progress: ${city.buildProgress}/${UNIT_TYPES[city.building].cost}`;
        
        const buildingPanel = document.getElementById('building-panel');
        buildingPanel.innerHTML = '';
        for (const [bName, bData] of Object.entries(BUILDINGS)) {
            const btn = document.createElement('button');
            btn.className = 'building-btn';
            btn.textContent = `${bData.icon} ${bName} (${bData.cost}g)`;
            btn.onclick = () => buildBuilding(bName, selectedTile.r, selectedTile.c);
            buildingPanel.appendChild(btn);
        }
    } else {
        cityPanel.style.display = "none";
    }
}

// --- RENDERING ---
function drawHexagon(tile) {
    const { x, y, terrain, owner, city } = tile;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i - (Math.PI / 2); 
        ctx.lineTo(x + HEX_RADIUS * Math.cos(angle), y + HEX_RADIUS * Math.sin(angle));
    }
    ctx.closePath();
    ctx.fillStyle = terrain.color; ctx.fill();
        
    if (owner) {
        const ownerCiv = (owner === "Player 1") ? playerCiv : getCivKey(owner);
        ctx.fillStyle = CIV_DATA[ownerCiv].color;
        ctx.fill();
        ctx.strokeStyle = CIV_DATA[ownerCiv].border;
        ctx.lineWidth = 2;
    } else {
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.lineWidth = 1;
    }
    
    if (tile === selectedTile) { ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 4; }
    ctx.stroke();

    if (city) {
        ctx.fillStyle = owner === "Player 1" ? "#5a2e98" : CIV_DATA[getCivKey(owner)].border;
        ctx.beginPath(); ctx.arc(x, y-5, 12, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = "white"; ctx.font = "10px sans-serif"; ctx.textAlign = "center"; ctx.fillText("🏛", x, y-2);
        ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(x - 25, y + 8, 50, 14);
        ctx.fillStyle = "white"; ctx.fillText(city.name, x, y + 18);
    }
    
    tile.buildings.forEach((building, idx) => {
        const offsetX = (idx % 2) * 15 - 7.5;
        const offsetY = Math.floor(idx / 2) * 10 - 5;
        ctx.fillStyle = "rgba(200,150,50,0.8)";
        ctx.fillRect(x - 8 + offsetX, y - 15 + offsetY, 10, 10);
        ctx.strokeStyle = "#c4c4c4";
        ctx.lineWidth = 1;
        ctx.strokeRect(x - 8 + offsetX, y - 15 + offsetY, 10, 10);
    });
}

function drawUnit(unit, displayPos) {
    const finalPos = displayPos || grid[unit.r] && grid[unit.r][unit.c];
    if (!finalPos) return;
    
    ctx.fillStyle = unit.owner === "Player 1" ? ((selectedUnit === unit) ? "#8a4ef8" : "#4a1e78") : CIV_DATA[getCivKey(unit.owner)].border;
    
    if (unit.mp <= 0) ctx.globalAlpha = 0.5;
    
    ctx.beginPath(); 
    ctx.arc(finalPos.x + 10, finalPos.y + 10, 10, 0, Math.PI * 2); 
    ctx.fill();
    ctx.strokeStyle = "white"; 
    ctx.lineWidth = 1; 
    ctx.stroke();
    ctx.globalAlpha = 1.0;

    ctx.fillStyle = "white"; 
    ctx.font = "bold 12px sans-serif"; 
    ctx.textAlign = "center";
    ctx.fillText(UNIT_TYPES[unit.type].icon, finalPos.x + 10, finalPos.y + 14);
    
    if (unit.ranged && selectedUnit === unit && unit.owner === "Player 1") {
        ctx.strokeStyle = "rgba(255, 200, 0, 0.3)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(finalPos.x + 10, finalPos.y + 10, unit.range * HEX_RADIUS * 1.5, 0, Math.PI * 2);
        ctx.stroke();
        
        const targets = getRangedTargets(unit);
        targets.forEach(target => {
            const targetTile = grid[target.r] && grid[target.r][target.c];
            if (targetTile) {
                ctx.strokeStyle = "rgba(255, 100, 100, 0.6)";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(finalPos.x + 10, finalPos.y + 10);
                ctx.lineTo(targetTile.x + 10, targetTile.y + 10);
                ctx.stroke();
            }
        });
    }
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    
    ctx.translate(camera.x, camera.y);
    ctx.scale(camera.zoom, camera.zoom);
    
    grid.flat().forEach(drawHexagon);
    
    activeAnimations = activeAnimations.filter(anim => anim.update());
    
    units.forEach(unit => {
        const anim = activeAnimations.find(a => a.unit === unit);
        if (anim) {
            drawUnit(unit, anim.getDisplayPos());
        } else {
            drawUnit(unit);
        }
    });
    
    ctx.restore();
}

// --- INITIALIZATION ---
function init() {
    initGrid(40, 30); 
    
    const startPositions = [
        { r: 5, c: 5 },
        { r: 25, c: 25 },
        { r: 5, c: 25 },
        { r: 25, c: 5 }
    ];
    
    startPositions.forEach((pos, idx) => {
        if (idx === 0) {
            spawnUnit(pos.r, pos.c, "Player 1", "Settler");
            spawnUnit(pos.r, pos.c + 1, "Player 1", "Warrior");
            const startTile = grid[pos.r][pos.c];
            camera.x = -startTile.x + canvas.width / 2;
            camera.y = -startTile.y + canvas.height / 2;
        } else {
            const aiId = `AI_${idx}`;
            spawnUnit(pos.r, pos.c, aiId, "Settler");
            spawnUnit(pos.r, pos.c + 1, aiId, "Warrior");
        }
    });
    
    updateTechTree();
    updateCivicTree();
    updateUI();
    render();
}

init();
setInterval(render, 16);
</script>

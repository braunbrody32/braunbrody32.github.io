<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Civ 67 (Main)</title>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; margin: 0; background: #1a1a1a; color: #f0f0f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #1a1a1a, #353535, #7a4eb8);
        }
        #title {
            padding: 10px 40px; font-weight: bold; cursor: pointer; background: #5a2e98; color: white; 
            border: 1px solid #7a4eb8; border-radius: 4px; transition: 0.2s; margin-bottom: 5px;
            align-content: center; align-items: center;
        }
        button { 
            padding: 8px 12px; font-weight: bold; cursor: pointer; background: #5a2e98; color: white; 
            border: 1px solid #7a4eb8; border-radius: 4px; transition: 0.2s; width: 30%; margin-bottom: 5px;
        }
        button:hover { background: #7a4eb8; }
        button:disabled { background: #444; color: #888; border-color: #555; cursor: not-allowed; }
    </style>
</head>
<body>
    <br><br><br><br><br><br><br><br>
    <h1 id="title">Civilization VI VII</h1>
    <br><br><br><br><br><br><br><br><br><br><br>
    <button type="button" id="start">Start Game</button>
    <button type="button" id="leave">Leave</button>
    <script>
        document.getElementById("start").addEventListener("click", function() {
            window.location.href = "nationenter.html";
        });
        document.getElementById("leave").addEventListener("click", function() {
            window.location.href = "../index.html";
        });
    </script>
</body>
</html>

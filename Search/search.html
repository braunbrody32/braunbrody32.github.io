<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Braun's Search Engine</title>
    <style>
        body {background-color: black; color: white; font-family: sans-serif; text-align: center; font-size: large;}
        a {color: rgb(128, 0, 255); text-decoration: none; }
        #sstring { 
            border: 2px solid #ccc;
            border-radius: 50px;
            padding: 10px 20px;
            outline: none;
            font-size: 16px;
            transition: border-color 0.3s;
            padding: 5px; width: 250px;
            border-color: rgb(128, 0, 255);
            background: #111;
            color: white;
        }
        button { 
            padding: 1px 5px; cursor: pointer; 
            border: 1px solid rgb(128, 0, 255);
            border-radius: 10px;
            padding: 2px 5px;
            outline: none;
            transition: border-color 0.3s;
            padding: 5px; width: 70px;
            border-color: rgb(128, 0, 255);
            background: #111;
            color: white;
        }
        button:hover { color: rgb(128, 0, 255); }
        #content-display {text-align: center;}
        #game-frame {
            width: 960px;
            height: 600px;
            border: none;
            display: block;
            margin: 20px auto 0;
        }

        /* AI Modal */
        #ai-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 560px;
            max-width: 95vw;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.2);
            z-index: 1000;
            font-family: sans-serif;
            overflow: hidden;
        }
        #ai-modal.open { display: flex; flex-direction: column; }
        #ai-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border-bottom: 1px solid #222;
            background: #111;
        }
        #ai-modal-header span {
            font-size: 15px;
            font-weight: bold;
            color: rgb(255, 0, 255);
            letter-spacing: 1px;
        }
        #ai-close {
            background: none;
            border: none;
            color: #aaa;
            font-size: 20px;
            cursor: pointer;
            width: auto;
            padding: 0 4px;
        }
        #ai-close:hover { color: white; background: none; }
        #ai-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            min-height: 260px;
            max-height: 380px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .ai-msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .ai-msg.user {
            align-self: flex-end;
            background: #1a1a2e;
            border: 1px solid #333;
            color: #ddd;
        }
        .ai-msg.assistant {
            align-self: flex-start;
            background: #1a0a1a;
            border: 1px solid #4a004a;
            color: #f0d0f0;
        }
        .ai-msg.thinking {
            align-self: flex-start;
            background: #111;
            border: 1px solid #333;
            color: #666;
            font-style: italic;
        }
        #ai-input-row {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid #222;
            background: #0d0d0d;
        }
        #ai-input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            padding: 9px 14px;
            outline: none;
            resize: none;
            font-family: sans-serif;
        }
        #ai-input:focus { border-color: rgb(255, 0, 255); }
        #ai-send {
            background: rgb(180, 0, 180);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            padding: 9px 16px;
            cursor: pointer;
            width: auto;
            transition: background 0.2s;
        }
        #ai-send:hover { background: rgb(220, 0, 220); }
        #ai-send:disabled { background: #444; cursor: default; }

        /* Overlay */
        #ai-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 999;
        }
        #ai-overlay.open { display: block; }
    </style>
</head>
<body>
    <h1 id="ptitle">Braun's Search Engine</h1>
    <input type="text" name="q" placeholder="Search whatever..." id="sstring" list="suggestions">
    <datalist id="suggestions"></datalist>
    <button type="button" id="search">Search</button>
    <button type="button" id="braunai">Braun AI</button>

    <div id="content-display" style="margin-top: 20px;">Type something...</div>

    <!-- AI Chat Modal -->
    <div id="ai-overlay"></div>
    <div id="ai-modal">
        <div id="ai-modal-header">
            <span>Braun AI</span>
            <button id="ai-close">✕</button>
        </div>
        <div id="ai-messages"></div>
        <div id="ai-input-row">
            <textarea id="ai-input" rows="1" placeholder="Ask Braun AI anything..."></textarea>
            <button id="ai-send">Send</button>
        </div>
    </div>

    <script>
        const GROQ_API_KEY = "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";
        const GROQ_MODEL = "llama-3.1-8b-instant";

        const queryInput = document.getElementById("sstring");
        const suggestionList = document.getElementById("suggestions");
        const display = document.getElementById("content-display");
        const ptitle = document.getElementById("ptitle");

        // Title color animation
        let red = 255, green = 255, descending = true;
        setInterval(() => {
            if (descending) {
                if (red > 128) red -= 1;
                if (green > 0) green -= 2;
                if (red <= 128 && green <= 0) descending = false;
            } else {
                if (red < 255) red += 1;
                if (green < 255) green += 2;
                if (red >= 255 && green >= 255) descending = true;
            }
            ptitle.style.color = `rgb(${red}, ${green}, 255)`;
        }, 20);

        // Suggestions
        async function fetchSuggestions(term) {
            if (term.length < 2) return;
            const endpoint = "https://en.wikipedia.org/w/api.php";
            const params = new URLSearchParams({
                action: "opensearch", search: term, limit: "5",
                namespace: "0", format: "json", origin: "*"
            });
            try {
                const response = await fetch(`${endpoint}?${params}`);
                const data = await response.json();
                suggestionList.innerHTML = "";
                data[1].forEach(item => {
                    const option = document.createElement("option");
                    option.value = item;
                    suggestionList.appendChild(option);
                });
            } catch (e) { console.error("Suggestion error:", e); }
        }

        function loadBigEGame() {
            display.innerHTML = "";
            const iframe = document.createElement("iframe");
            iframe.id = "game-frame"; iframe.src = "index-2.html";
            iframe.allow = "autoplay; fullscreen";
            display.appendChild(iframe);
        }
        function loadDotWarGame() {
            display.innerHTML = "";
            const iframe = document.createElement("iframe");
            iframe.id = "game-frame"; iframe.src = "index.html";
            iframe.allow = "autoplay; fullscreen";
            display.appendChild(iframe);
        }

        async function getWikiPage(pageTitle) {
            const endpoint = "https://en.wikipedia.org/w/api.php";
            const params = new URLSearchParams({
                action: "parse", page: pageTitle, format: "json",
                prop: "text|images", redirects: "true", origin: "*"
            });
            try {
                const response = await fetch(`${endpoint}?${params}`);
                const data = await response.json();
                if (data.error) { display.innerHTML = "Page not found."; return; }
                let htmlContent = data.parse.text["*"];
                htmlContent = htmlContent.replace(/src="\/\//g, 'src="https://');
                display.innerHTML = htmlContent;
            } catch (e) { display.innerHTML = "Error loading content."; }
        }

        function handleSearch() {
            const query = queryInput.value.trim();
            if (query.toLowerCase() === "big e") loadBigEGame();
            else if (query.toLowerCase() === "dot war") loadDotWarGame();
            else getWikiPage(query);
        }

        queryInput.addEventListener("input", (e) => fetchSuggestions(e.target.value));
        queryInput.addEventListener("keydown", (e) => { if (e.key === "Enter") handleSearch(); });
        document.getElementById("search").addEventListener("click", handleSearch);

        // ─── Braun AI Modal ───────────────────────────────────────────
        const modal = document.getElementById("ai-modal");
        const overlay = document.getElementById("ai-overlay");
        const messagesDiv = document.getElementById("ai-messages");
        const aiInput = document.getElementById("ai-input");
        const aiSend = document.getElementById("ai-send");
        let chatHistory = [];

        function openModal() {
            modal.classList.add("open");
            overlay.classList.add("open");
            if (chatHistory.length === 0) {
                addMessage("assistant", "Hey! I'm Braun AI. Ask me anything.");
            }
            aiInput.focus();
        }

        function closeModal() {
            modal.classList.remove("open");
            overlay.classList.remove("open");
        }

        document.getElementById("braunai").addEventListener("click", openModal);
        document.getElementById("ai-close").addEventListener("click", closeModal);
        overlay.addEventListener("click", closeModal);

        function addMessage(role, text) {
            const div = document.createElement("div");
            div.className = `ai-msg ${role}`;
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return div;
        }

        aiInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        aiSend.addEventListener("click", sendMessage);

        async function sendMessage() {
            const text = aiInput.value.trim();
            if (!text || aiSend.disabled) return;

            aiInput.value = "";
            aiSend.disabled = true;
            addMessage("user", text);
            chatHistory.push({ role: "user", content: text });

            const thinking = addMessage("thinking", "Braun AI is thinking...");

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: GROQ_MODEL,
                        messages: [
                            { role: "system", content: "You are Braun AI, a helpful and concise assistant built into Braun's Search Engine." },
                            ...chatHistory
                        ],
                        max_tokens: 1024,
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                thinking.remove();

                if (data.error) {
                    addMessage("assistant", `Error: ${data.error.message}`);
                } else {
                    const reply = data.choices[0].message.content;
                    addMessage("assistant", reply);
                    chatHistory.push({ role: "assistant", content: reply });
                }
            } catch (err) {
                thinking.remove();
                addMessage("assistant", "Network error. Could not reach Groq API.");
                console.error(err);
            }

            aiSend.disabled = false;
            aiInput.focus();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Element Sandbox — Recipe Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --mc-bg:        #1a1a2e;
    --mc-panel:     #2d2d2d;
    --mc-panel2:    #3a3a3a;
    --mc-slot:      #8b8b8b;
    --mc-slot-in:   #373737;
    --mc-slot-hi:   #ffffff22;
    --mc-border-lt: #ffffff55;
    --mc-border-dk: #00000088;
    --mc-text:      #dddddd;
    --mc-gold:      #ffaa00;
    --mc-wood:      #6b3d1e;
    --mc-wood2:     #8B4513;
    --font:         'Press Start 2P', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; image-rendering: pixelated; }

  body {
    background: var(--mc-bg);
    color: var(--mc-text);
    font-family: var(--font);
    font-size: 10px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: #111;
    border-bottom: 3px solid #000;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header h1 {
    font-size: 13px;
    color: var(--mc-gold);
    text-shadow: 2px 2px #000;
    letter-spacing: 1px;
  }
  .back-link {
    font-family: var(--font);
    font-size: 8px;
    color: #aaa;
    text-decoration: none;
    background: var(--mc-panel2);
    padding: 6px 10px;
    border: 2px solid #555;
    border-bottom-color: #222;
    border-right-color: #222;
    cursor: pointer;
    transition: background .1s;
  }
  .back-link:hover { background: #4a4a4a; color: #fff; }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 50px);
  }

  /* ── Sidebar ── */
  aside {
    width: 240px;
    min-width: 240px;
    background: #111;
    border-right: 3px solid #000;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-search {
    padding: 8px;
    background: #1a1a1a;
    border-bottom: 2px solid #000;
  }
  .sidebar-search input {
    width: 100%;
    background: var(--mc-slot-in);
    border: 2px solid #555;
    border-top-color: #222;
    border-left-color: #222;
    color: #fff;
    font-family: var(--font);
    font-size: 7px;
    padding: 6px 8px;
    outline: none;
  }
  .sidebar-search input::placeholder { color: #666; }

  .sidebar-list {
    overflow-y: auto;
    flex: 1;
    padding: 4px 0;
  }
  .sidebar-list::-webkit-scrollbar { width: 8px; }
  .sidebar-list::-webkit-scrollbar-track { background: #111; }
  .sidebar-list::-webkit-scrollbar-thumb { background: #555; border: 2px solid #111; }

  .category-header {
    font-size: 7px;
    color: var(--mc-gold);
    padding: 8px 10px 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-top: 1px solid #333;
    margin-top: 4px;
  }
  .category-header:first-child { border-top: none; margin-top: 0; }

  .recipe-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    background: none;
    border: none;
    color: var(--mc-text);
    font-family: var(--font);
    font-size: 7px;
    padding: 7px 12px;
    cursor: pointer;
    text-align: left;
    transition: background .1s;
  }
  .recipe-btn:hover  { background: #2a2a2a; color: #fff; }
  .recipe-btn.active { background: #3a3a3a; color: var(--mc-gold); }

  .recipe-btn .dot {
    width: 12px;
    height: 12px;
    border: 1px solid #00000066;
    flex-shrink: 0;
    image-rendering: pixelated;
  }

  /* ── Main area ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: radial-gradient(ellipse at center, #1e2a3a 0%, #0d0d1a 100%);
    overflow-y: auto;
  }

  .placeholder {
    text-align: center;
    color: #444;
    font-size: 9px;
    line-height: 2.5;
  }
  .placeholder .big { font-size: 48px; display: block; margin-bottom: 16px; }

  /* ── Crafting Table ── */
  .crafting-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  .recipe-title {
    font-size: 11px;
    color: var(--mc-gold);
    text-shadow: 2px 2px #000;
    text-align: center;
  }
  .recipe-note {
    font-size: 7px;
    color: #888;
    text-align: center;
    max-width: 420px;
    line-height: 2;
    margin-top: -8px;
  }

  /* The big crafting table panel */
  .crafting-table {
    background: linear-gradient(135deg, #3e2a1a 0%, #2a1a0a 50%, #3e2a1a 100%);
    border: 4px solid #000;
    border-bottom-color: #000;
    border-right-color: #000;
    border-top-color: #6b4c2a;
    border-left-color: #6b4c2a;
    padding: 20px 28px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    position: relative;
    box-shadow: 0 8px 32px #00000088, inset 0 1px 0 #7a5c3a44;
  }

  /* Wood grain overlay */
  .crafting-table::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(90deg, transparent 0px, transparent 18px, #00000008 18px, #00000008 19px),
      repeating-linear-gradient(0deg, transparent 0px, transparent 12px, #00000010 12px, #00000010 13px);
    pointer-events: none;
  }

  .grid-label {
    font-size: 7px;
    color: #8b6a3a;
    text-align: center;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .grid-3x3 {
    display: grid;
    grid-template-columns: repeat(3, 52px);
    grid-template-rows: repeat(3, 52px);
    gap: 4px;
    position: relative;
    z-index: 1;
  }

  .slot {
    width: 52px;
    height: 52px;
    background: var(--mc-slot-in);
    border: 2px solid #000;
    border-top-color: #222;
    border-left-color: #222;
    border-bottom-color: #888;
    border-right-color: #888;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: border-color .1s;
  }
  .slot.filled {
    border-top-color: #555;
    border-left-color: #555;
    border-bottom-color: #bbb;
    border-right-color: #bbb;
  }
  .slot.filled:hover { border-color: #fff8; }

  .slot-inner {
    width: 40px;
    height: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    font-size: 5.5px;
    text-align: center;
    color: #fff;
    text-shadow: 1px 1px #000;
    line-height: 1.3;
    padding: 2px;
    word-break: break-word;
    overflow: hidden;
  }

  .elem-block {
    width: 28px;
    height: 28px;
    border: 2px solid #000;
    border-top-color: #ffffff44;
    border-left-color: #ffffff44;
    flex-shrink: 0;
  }
  .elem-label {
    font-size: 5px;
    text-align: center;
    line-height: 1.2;
    color: #eee;
    text-shadow: 1px 1px #000;
    max-width: 40px;
    overflow: hidden;
  }

  /* Arrow */
  .arrow-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    position: relative;
    z-index: 1;
  }
  .arrow-label { font-size: 6px; color: #8b6a3a; }
  .arrow {
    width: 40px;
    height: 20px;
    background: var(--mc-gold);
    clip-path: polygon(0 30%, 60% 30%, 60% 0%, 100% 50%, 60% 100%, 60% 70%, 0 70%);
    filter: drop-shadow(2px 2px 0 #000);
    animation: pulse-arrow 1.5s ease-in-out infinite;
  }
  @keyframes pulse-arrow {
    0%,100% { opacity: 1; }
    50%      { opacity: .5; }
  }

  /* Result slot — bigger */
  .result-slot {
    width: 64px;
    height: 64px;
    background: var(--mc-slot-in);
    border: 3px solid #000;
    border-top-color: #222;
    border-left-color: #222;
    border-bottom-color: #aaa;
    border-right-color: #aaa;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }
  .result-slot .slot-inner {
    width: 52px;
    height: 52px;
  }
  .result-slot .elem-block {
    width: 36px;
    height: 36px;
  }
  .result-slot .elem-label { font-size: 5.5px; }

  /* Tooltip */
  .slot[data-tip]:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #100010ee;
    color: #fff;
    font-family: var(--font);
    font-size: 7px;
    padding: 5px 8px;
    border: 1px solid #884499;
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
    line-height: 1.8;
    text-shadow: 1px 1px #000;
  }

  /* ── Info panel below table ── */
  .info-panel {
    background: #1a1a1a;
    border: 2px solid #333;
    padding: 12px 18px;
    max-width: 420px;
    width: 100%;
    font-size: 7px;
    color: #aaa;
    line-height: 2.2;
    text-align: center;
  }
  .info-panel span { color: var(--mc-gold); }

  /* ═══════════════ TABS ═══════════════ */
  .tab-bar {
    display: flex;
    background: #0a0a0a;
    border-bottom: 3px solid #000;
    padding: 0 10px;
    gap: 2px;
  }
  .tab-btn {
    font-family: var(--font);
    font-size: 8px;
    color: #555;
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    padding: 9px 14px;
    cursor: pointer;
    margin-bottom: -3px;
    transition: color .12s;
    white-space: nowrap;
  }
  .tab-btn:hover  { color: #aaa; }
  .tab-btn.active { color: var(--mc-gold); border-bottom-color: var(--mc-gold); }

  .tab-panel         { display: none; }
  .tab-panel.active  { display: flex; }

  /* recipes panel — restore original layout behaviour */
  #tab-recipes.active {
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 84px);  /* header + tab-bar */
  }

  /* ═══════════════ PERIODIC TABLE PANEL ═══════════════ */
  #tab-periodic.active {
    flex-direction: column;
    align-items: center;
    overflow-y: auto;
    padding: 18px 12px 32px;
    background: #0b0b18;
    height: calc(100vh - 84px);
  }
  .pt-heading {
    font-size: 10px;
    color: var(--mc-gold);
    text-shadow: 2px 2px #000;
    margin-bottom: 14px;
    letter-spacing: 1px;
  }

  /* Grid: 18 cols × N rows, each cell 34×34 */
  .pt-grid {
    display: grid;
    grid-template-columns: repeat(18, 34px);
    gap: 2px;
  }

  .pt-cell {
    width: 34px; height: 34px;
    border: 1px solid #2a2a2a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: default;
    position: relative;
    transition: transform .08s, border-color .08s, z-index 0s;
  }
  .pt-cell:not(.pt-empty):hover {
    transform: scale(1.22);
    z-index: 20;
    border-color: #fff !important;
  }
  .pt-num  { font-size: 4px; color: rgba(255,255,255,0.45); line-height: 1.1; }
  .pt-sym  { font-size: 10px; color: #fff; line-height: 1.2; text-shadow: 1px 1px #000; font-weight: bold; }
  .pt-name { font-size: 4px; color: rgba(255,255,255,0.6); line-height: 1; overflow:hidden; max-width:32px; text-align:center; }
  .pt-empty { border: none !important; background: transparent !important; cursor: default; }
  .pt-empty:hover { transform: none !important; }

  /* sandbox gold glow */
  .pt-sandbox { border-color: var(--mc-gold) !important; box-shadow: 0 0 5px var(--mc-gold); }

  /* category backgrounds */
  .pt-alkali     { background: #5c1a1a; }
  .pt-alkearth   { background: #4a2900; }
  .pt-transition { background: #152738; }
  .pt-post       { background: #143520; }
  .pt-metalloid  { background: #282800; }
  .pt-nonmetal   { background: #00281a; }
  .pt-halogen    { background: #141448; }
  .pt-noble      { background: #280028; }
  .pt-lanthanide { background: #162616; }
  .pt-actinide   { background: #381a00; }
  .pt-unknown    { background: #222222; }

  /* legend */
  .pt-legend {
    display: flex; flex-wrap: wrap;
    gap: 10px; margin-top: 14px;
    justify-content: center; max-width: 700px;
  }
  .pt-legend-item { display:flex; align-items:center; gap:5px; font-size:6px; color:#999; }
  .pt-legend-swatch { width:14px; height:14px; border:1px solid #444; flex-shrink:0; }

  /* floating tooltip */
  #pt-tooltip {
    position: fixed;
    background: #0e000eee;
    color: #eee;
    font-family: var(--font);
    font-size: 7px;
    padding: 9px 12px;
    border: 1px solid #773399;
    z-index: 9999;
    pointer-events: none;
    display: none;
    line-height: 2;
    max-width: 210px;
  }

</style>
</head>
<body>

<header>
  <a href="index.html" class="back-link">← Back</a>
  <h1>Element Sandbox — Recipe Book</h1>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('recipes')">📖 Recipes</button>
  <button class="tab-btn"        onclick="switchTab('periodic')">⚗ Periodic Table</button>
</div>

<div id="tab-recipes" class="tab-panel active">
<div class="layout" style="height:100%;flex:1">
  <aside>
    <div class="sidebar-search">
      <input type="text" id="search" placeholder="Search recipes..." oninput="filterRecipes(this.value)">
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </aside>

  <main id="main">
    <div class="placeholder">
      <span class="big">:)</span>
      Select a recipe from the sidebar
    </div>
  </main>
</div><!-- .layout -->
</div><!-- #tab-recipes -->

<!-- ═══════════════════ PERIODIC TABLE PANEL ═══════════════════ -->
<div id="tab-periodic" class="tab-panel">
  <div class="pt-heading">⚗ Periodic Table of Elements</div>
  <div class="pt-grid" id="pt-grid"></div>
  <div class="pt-legend" id="pt-legend"></div>
</div>

<div id="pt-tooltip"></div>

<script>
// ─────────────────────────────────────────────
// Element color palette (matches styles.css)
// ─────────────────────────────────────────────
const COLORS = {
  Dirt:       '#7a3b1a', Sand:       '#DDB88D', Ash:        '#888888',
  Snow:       '#E8F0FF', Salt:       '#F0F0F0', Gunpowder:  '#2f2f2f',
  Mud:        '#4a2c00', 'Anti-Powder':'#FF00FF',Charcoal:  '#1a1a1a',
  Sulfur:     '#c8b400', Coal:       '#111111', Chalk:      '#f0f0f0',
  Gravel:     '#787878', Rust:       '#8B4010', Stone:      '#636363',
  Wood:       '#7C4A07', Ice:        '#A0D8EF', Obsidian:   '#2a1040',
  Glass:      '#c8eef5', Rubber:     '#1a1a1a', Sponge:     '#d4aa00',
  Fuse:       '#8B4513', Concrete:   '#aaaaaa', Steel:      '#b0b8c0',
  Diamond:    '#c8f0ff', Wax:        '#fffacd', Ceramic:    '#e8d8c0',
  Brick:      '#8B3500', Crystal:    '#aaffff', Water:      '#1E90FF',
  Oil:        '#322300', Acid:       '#00FF04', Lava:       '#FF4500',
  Saltwater:  '#4488cc', 'Anti-Liquid':'#A128BF',Alcohol:   '#d4f0ff',
  Mercury:    '#c8c8cc', Honey:      '#d4a000', Tar:        '#0a0a0a',
  Slime:      '#00aa44', Blood:      '#cc0000', Steam:      '#d1d1d1',
  Smoke:      '#555555', 'Toxic Gas': '#88dd00', Methane:   '#aaffaa',
  'Anti-Gas': '#c767de', Hydrogen:   '#eeffee', Oxygen:     '#eeeeff',
  Nitrogen:   '#c0c8ff', Propane:    '#ffffcc', Fog:        '#e8e8e8',
  Heater:     '#736251', Cooler:     '#00ccff', Fire:       '#FF4900',
  Ember:      '#ff6600', Bomb:       '#1d612c', TNT:        '#cc0000',
  NitroGel:   '#80ff40', Virus:      '#ff00aa', Plasma:     '#ee44ff',
  Lightning:  '#ffff44', Cloner:     '#A9AB65', Destroyer:  '#404040',
  Gel:        '#88ff88', Superacid:  '#dd00ff', Antimatter: '#220022',
  Void:       '#050005',
};

function col(name) { return COLORS[name] || '#666666'; }

// ─────────────────────────────────────────────
// Recipe data
// grid: array of {row,col,elem} — 3x3, 0-indexed
// For simple 2-ingredient recipes: put A at [1,0], B at [1,1]
// ─────────────────────────────────────────────
const RECIPES = [
  // ── Powders ────────────────────────────────
  { cat:'Powders', result:'Mud',      note:'Dirt slowly absorbs nearby water',
    grid:[{r:1,c:0,e:'Dirt'},{r:1,c:1,e:'Water'}] },
  { cat:'Powders', result:'Dirt',     note:'Mud dries out near brief heat',
    grid:[{r:1,c:0,e:'Mud'},{r:1,c:1,e:'Fire'}] },
  { cat:'Powders', result:'Glass',    note:'Sand melts under extreme heat',
    grid:[{r:1,c:0,e:'Sand'},{r:1,c:1,e:'Heater'}] },
  { cat:'Powders', result:'Glass',    note:'Sand + Lava melts into glass',     altLabel:'Glass (Lava)',
    grid:[{r:1,c:0,e:'Sand'},{r:1,c:1,e:'Lava'}] },
  { cat:'Powders', result:'Rust',     note:'Steel slowly corrodes in water. Saltwater or Blood speeds it up',
    grid:[{r:1,c:0,e:'Steel'},{r:1,c:1,e:'Water'}] },
  { cat:'Powders', result:'Charcoal', note:'Wood ignites and drops Charcoal in adjacent cells',
    grid:[{r:1,c:0,e:'Wood'},{r:1,c:1,e:'Fire'}] },
  { cat:'Powders', result:'Ash',      note:'Charcoal burns out into Ash after ~500 frames',
    grid:[{r:1,c:0,e:'Charcoal'},{r:0,c:0,e:'Fire'},{r:0,c:1,e:'Fire'},{r:2,c:0,e:'Fire'},{r:2,c:1,e:'Fire'}] },
  { cat:'Powders', result:'Ash',      altLabel:'Ash (Coal)', note:'Coal burns out into Ash after ~800 frames',
    grid:[{r:1,c:0,e:'Coal'},{r:0,c:0,e:'Fire'},{r:0,c:1,e:'Fire'},{r:2,c:0,e:'Fire'},{r:2,c:1,e:'Fire'}] },

  // ── Solids ─────────────────────────────────
  { cat:'Solids', result:'Ice',       note:'Water freezes on contact with Cooler',
    grid:[{r:1,c:0,e:'Water'},{r:1,c:1,e:'Cooler'}] },
  { cat:'Solids', result:'Ice',       altLabel:'Ice (Nitrogen)', note:'Nitrogen flash-freezes water',
    grid:[{r:1,c:0,e:'Water'},{r:1,c:1,e:'Nitrogen'}] },
  { cat:'Solids', result:'Ice',       altLabel:'Ice (Saltwater)', note:'Saltwater also freezes with Cooler',
    grid:[{r:1,c:0,e:'Saltwater'},{r:1,c:1,e:'Cooler'}] },
  { cat:'Solids', result:'Obsidian',  note:'Lava solidifies when touching water',
    grid:[{r:1,c:0,e:'Lava'},{r:1,c:1,e:'Water'}] },
  { cat:'Solids', result:'Obsidian',  altLabel:'Obsidian (Ice)', note:'Ice + Lava react to form Obsidian + Steam burst',
    grid:[{r:1,c:0,e:'Ice'},{r:1,c:1,e:'Lava'}] },
  { cat:'Solids', result:'Stone',     note:'Cooler solidifies lava into stone',
    grid:[{r:1,c:0,e:'Lava'},{r:1,c:1,e:'Cooler'}] },
  { cat:'Solids', result:'Stone',     altLabel:'Stone (Nitrogen)', note:'Nitrogen rapidly cools lava',
    grid:[{r:1,c:0,e:'Lava'},{r:1,c:1,e:'Nitrogen'}] },
  { cat:'Solids', result:'Brick',     note:'Mud that stays near heat long enough fires into brick',
    grid:[{r:0,c:0,e:'Heater'},{r:0,c:1,e:'Heater'},{r:0,c:2,e:'Heater'},
          {r:1,c:1,e:'Mud'},
          {r:2,c:0,e:'Heater'},{r:2,c:1,e:'Heater'},{r:2,c:2,e:'Heater'}] },
  { cat:'Solids', result:'Crystal',   note:'Crystal slowly grows by converting adjacent saltwater',
    grid:[{r:1,c:0,e:'Saltwater'},{r:1,c:1,e:'Crystal'},{r:1,c:2,e:'Saltwater'}] },

  // ── Liquids ────────────────────────────────
  { cat:'Liquids', result:'Water',    note:'Ice melts back to water near heat',
    grid:[{r:1,c:0,e:'Ice'},{r:1,c:1,e:'Fire'}] },
  { cat:'Liquids', result:'Water',    altLabel:'Water (Snow)', note:'Snow melts near fire or lava',
    grid:[{r:1,c:0,e:'Snow'},{r:1,c:1,e:'Lava'}] },
  { cat:'Liquids', result:'Water',    altLabel:'Water (Fog)', note:'Cold condenses fog into water',
    grid:[{r:1,c:0,e:'Fog'},{r:1,c:1,e:'Cooler'}] },
  { cat:'Liquids', result:'Saltwater',note:'Salt dissolves into water',
    grid:[{r:1,c:0,e:'Water'},{r:1,c:1,e:'Salt'}] },

// ─────────────────────────────────────────────
// Build sidebar
// ─────────────────────────────────────────────
let activeIdx = -1;

function buildSidebar(filter='') {
  const list = document.getElementById('sidebar-list');
  list.innerHTML = '';
  const lower = filter.toLowerCase();

  const categories = [...new Set(RECIPES.map(r=>r.cat))];
  let anyVisible = false;

  categories.forEach(cat => {
    const items = RECIPES.map((r,i)=>({r,i})).filter(({r})=> r.cat===cat &&
      (r.altLabel||r.result).toLowerCase().includes(lower));
    if (!items.length) return;
    anyVisible = true;

    const hdr = document.createElement('div');
    hdr.className = 'category-header';
    hdr.textContent = cat;
    list.appendChild(hdr);

    items.forEach(({r,i}) => {
      const btn = document.createElement('button');
      btn.className = 'recipe-btn' + (i===activeIdx?' active':'');
      btn.dataset.idx = i;

      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.style.background = col(r.result);
      if (['Charcoal','Tar','Void','Coal','Oil'].includes(r.result)) dot.style.border='1px solid #555';

      const lbl = document.createElement('span');
      lbl.textContent = r.altLabel || r.result;

      btn.appendChild(dot);
      btn.appendChild(lbl);
      btn.onclick = () => showRecipe(i);
      list.appendChild(btn);
    });
  });

  if (!anyVisible) {
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:20px;color:#444;font-size:7px;text-align:center;line-height:2';
    empty.textContent = 'No recipes found';
    list.appendChild(empty);
  }
}

function filterRecipes(val) { buildSidebar(val); }

// ─────────────────────────────────────────────
// Render crafting table
// ─────────────────────────────────────────────
function showRecipe(idx) {
  activeIdx = idx;
  buildSidebar(document.getElementById('search').value);

  const r = RECIPES[idx];
  const main = document.getElementById('main');

  // Build a 3x3 map
  const map = {};
  r.grid.forEach(g => { map[`${g.r},${g.c}`] = g.e; });

  // Build grid HTML
  let gridHTML = '';
  for (let row=0; row<3; row++) {
    for (let col=0; col<3; col++) {
      const elem = map[`${row},${col}`];
      if (elem) {
        gridHTML += `
          <div class="slot filled" data-tip="${elem}">
            <div class="slot-inner">
              <div class="elem-block" style="background:${COLORS[elem]||'#666'};${
                ['Charcoal','Tar','Void','Coal','Oil','Wood','Mud'].includes(elem)
                  ? 'border-top-color:#ffffff22;border-left-color:#ffffff22;'
                  : ''
              }"></div>
              <div class="elem-label">${elem}</div>
            </div>
          </div>`;
      } else {
        gridHTML += `<div class="slot"></div>`;
      }
    }
  }

  // Determine result color
  const resultName = r.result === 'Explosion' ? 'Fire' : r.result;
  const resultColor = COLORS[resultName] || '#888';
  const resultLabel = r.result;

  main.innerHTML = `
    <div class="crafting-wrap">
      <div class="recipe-title">${r.altLabel || r.result}</div>
      <div class="recipe-note">${r.note}</div>
      <div class="crafting-table">
        <div style="position:relative;z-index:1">
          <div class="grid-label">INGREDIENTS</div>
          <div class="grid-3x3">${gridHTML}</div>
        </div>
        <div class="arrow-wrap">
          <div class="arrow-label">YIELDS</div>
          <div class="arrow"></div>
        </div>
        <div style="position:relative;z-index:1">
          <div class="grid-label">RESULT</div>
          <div class="result-slot" data-tip="${resultLabel}">
            <div class="slot-inner">
              <div class="elem-block" style="width:40px;height:40px;background:${resultColor};${
                ['Charcoal','Tar','Void','Coal','Oil','Antimatter'].includes(resultLabel)
                  ? 'border-top-color:#ffffff22;border-left-color:#ffffff22;'
                  : ''
              }"></div>
              <div class="elem-label" style="font-size:6px">${resultLabel}</div>
            </div>
          </div>
        </div>
      </div>
      <div class="info-panel">
        <span>Tip:</span> Reactions are probability-based and may require
        sustained contact to trigger. Some results take multiple frames.
      </div>
    </div>`;
}

// Init
buildSidebar();


// ════════════════════════════════════════════════════════════
// TAB SWITCHER
// ════════════════════════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.textContent.toLowerCase().includes(name === 'recipes' ? '📖' : '⚗')) b.classList.add('active');
  });
  // simpler: match by index
  const btns = document.querySelectorAll('.tab-btn');
  btns[0].classList.toggle('active', name==='recipes');
  btns[1].classList.toggle('active', name==='periodic');
}

const PT_CAT_BG = {
  alkali:'#5c1a1a', alkearth:'#4a2900', transition:'#152738',
  post:'#143520',   metalloid:'#282800', nonmetal:'#00281a',
  halogen:'#141448',noble:'#280028',    lanthanide:'#162616',
  actinide:'#381a00',unknown:'#222222'
};
const PT_LEGEND_LABELS = {
  alkali:'Alkali Metal', alkearth:'Alkaline Earth', transition:'Transition Metal',
  post:'Post-Transition', metalloid:'Metalloid', nonmetal:'Nonmetal',
  halogen:'Halogen', noble:'Noble Gas', lanthanide:'Lanthanide',
  actinide:'Actinide', unknown:'Unknown'
};

function buildPeriodicTable() {
  const gridEl   = document.getElementById('pt-grid');
  const legendEl = document.getElementById('pt-legend');
  const tooltip  = document.getElementById('pt-tooltip');

  // Build position lookup for rows 1-7 (18 cols each)
  const posMap = new Map();
  PT_ELEMENTS.forEach(el => posMap.set(`${el.row},${el.col}`, el));

  function makeCell(el) {
    const div = document.createElement('div');
    const sb  = el && el.sandbox;
    div.className = el
      ? `pt-cell pt-${el.cat}${sb ? ' pt-sandbox' : ''}`
      : 'pt-cell pt-empty';
    if (el) {
      div.innerHTML =
        `<span class="pt-num">${el.n}</span>` +
        `<span class="pt-sym">${el.sym}</span>` +
        `<span class="pt-name">${el.name.length > 10 ? el.sym : el.name}</span>`;
      div.addEventListener('mousemove', e => {
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX + 16) + 'px';
        tooltip.style.top  = (e.clientY + 16) + 'px';
        const sbLine = sb ? `<br>🎮 <span style="color:#ffaa00">${sb}</span>` : '';
        tooltip.innerHTML = `<b>${el.n}. ${el.name} (${el.sym})</b><br>${el.desc}${sbLine}`;
      });
      div.addEventListener('mouseleave', () => tooltip.style.display = 'none');
    }
    return div;
  }

  // Rows 1–7 (main table)
  for (let row = 1; row <= 7; row++) {
    for (let col = 1; col <= 18; col++) {
      gridEl.appendChild(makeCell(posMap.get(`${row},${col}`) || null));
    }
  }

  // Blank spacer row
  for (let col = 1; col <= 18; col++) {
    const sp = document.createElement('div');
    sp.className = 'pt-cell pt-empty';
    gridEl.appendChild(sp);
  }

  // Lanthanide row (row 8, cols 1–3 empty, 4–18 filled)
  for (let col = 1; col <= 18; col++) {
    gridEl.appendChild(makeCell(col <= 3 ? null : (posMap.get(`8,${col}`) || null)));
  }

  // Actinide row (row 9)
  for (let col = 1; col <= 18; col++) {
    gridEl.appendChild(makeCell(col <= 3 ? null : (posMap.get(`9,${col}`) || null)));
  }

  // Legend
  const cats = Object.keys(PT_LEGEND_LABELS);
  cats.forEach(cat => {
    const item = document.createElement('div');
    item.className = 'pt-legend-item';
    item.innerHTML = `<div class="pt-legend-swatch" style="background:${PT_CAT_BG[cat]}"></div><span>${PT_LEGEND_LABELS[cat]}</span>`;
    legendEl.appendChild(item);
  });
  // Sandbox note
  const sbNote = document.createElement('div');
  sbNote.className = 'pt-legend-item';
  sbNote.innerHTML = `<div class="pt-legend-swatch" style="background:#222;border:1px solid #ffaa00;box-shadow:0 0 4px #ffaa00"></div><span style="color:#ffaa00">In Game ✦</span>`;
  legendEl.appendChild(sbNote);
}

buildPeriodicTable();

</script>
